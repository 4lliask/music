<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alliask - Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --mid: #444444;
            --light: #aaaaaa;
            --green: #1db954;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            cursor: none;
        }

        .cur {
            width: 10px; height: 10px;
            background: var(--white);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%,-50%) rotate(45deg);
            transition: width .15s, height .15s;
            mix-blend-mode: difference;
        }
        .cur-ring {
            width: 32px; height: 32px;
            border: 1.5px solid var(--white);
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%,-50%) rotate(45deg);
            transition: width .2s, height .2s;
            mix-blend-mode: difference;
        }
        .cur.big { width: 18px; height: 18px; }
        .cur-ring.big { width: 52px; height: 52px; }
        .cur {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0px;
            color: var(--black);
        }
        .cur::after {
            content: '!';
            font-size: 0px;
            opacity: 0;
            transition: font-size 0.25s ease, opacity 0.2s ease;
        }
        .cur.exclaim {
            background: var(--white);
            width: 44px; height: 44px;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%) rotate(0deg);
            border-radius: 50%;
            animation: diamondToCircle 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .cur.exclaim::after {
            font-size: 28px;
            opacity: 1;
            transition: font-size 0.2s ease 0.15s, opacity 0.2s ease 0.15s;
        }
        .cur-ring.exclaim { opacity: 0; transition: opacity 0.2s ease; }
        .cur.leaving {
            background: var(--white);
            mix-blend-mode: difference;
            animation: circleToDiamond 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .cur.leaving::after { font-size: 0px; opacity: 0; transition: font-size 0.1s ease, opacity 0.1s ease; }
        .cur-ring.leaving { opacity: 0; }

        @keyframes diamondToCircle {
            0%   { transform: translate(-50%, -50%) rotate(45deg);  width: 10px; height: 10px; border-radius: 0; }
            50%  { transform: translate(-50%, -50%) rotate(180deg); width: 28px; height: 28px; border-radius: 30%; }
            100% { transform: translate(-50%, -50%) rotate(360deg); width: 48px; height: 48px; border-radius: 50%; }
        }

        @keyframes circleToDiamond {
            0%   { transform: translate(-50%, -50%) rotate(0deg);   width: 48px; height: 48px; border-radius: 50%; }
            50%  { transform: translate(-50%, -50%) rotate(180deg); width: 28px; height: 28px; border-radius: 30%; }
            100% { transform: translate(-50%, -50%) rotate(225deg); width: 10px; height: 10px; border-radius: 0; }
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 48px 80px;
            position: relative;
            overflow: hidden;
            background: var(--white);
        }

        .hero-content { position: relative; z-index: 1; }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(100px, 18vw, 240px);
            line-height: 0.88;
            letter-spacing: 0.03em;
            color: var(--black);
            opacity: 0;
            animation: up 0.8s 0.65s forwards;
        }

        .hero-sub {
            margin-top: 24px;
            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #888888;
            opacity: 0;
            animation: up 0.7s 0.85s forwards;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: none; }
        }

        .scroll-hint {
            position: absolute;
            right: 48px; bottom: 80px;
            writing-mode: vertical-rl;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #999999;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: up 0.7s 1.2s forwards;
        }

        .scroll-hint::before {
            content: '';
            width: 1px; height: 50px;
            background: #999999;
            animation: lineDown 1.5s 1.4s ease infinite;
        }

        @keyframes lineDown {
            0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
            50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
            51%  { transform: scaleY(1); transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; opacity: 0.3; }
        }

        section { padding: 100px 48px; position: relative; }

        .sec-header { display: flex; align-items: center; gap: 20px; margin-bottom: 64px; }
        .sec-num { font-size: 9px; letter-spacing: 0.2em; color: var(--mid); }
        .sec-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--white);
        }
        .sec-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        #releases { border-top: 1px solid rgba(255,255,255,0.08); }
        .releases-list { display: flex; flex-direction: column; }

        .release-row {
            display: grid;
            grid-template-columns: 48px 1fr auto auto;
            align-items: center;
            gap: 24px;
            padding: 28px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: none;
            position: relative;
            overflow: hidden;
        }

        .release-row::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 0;
            background: rgba(255,255,255,0.03);
            transition: width .4s cubic-bezier(0.25,0.46,0.45,0.94);
            pointer-events: none;
        }

        .release-row:hover::after { width: 100%; }
        .row-cover {
            position: absolute;
            inset: 0;
            z-index: 2;
            cursor: none;
        }
        .release-row:hover .release-name { letter-spacing: 0.06em; }

        .rel-idx { font-size: 10px; color: var(--mid); letter-spacing: 0.1em; }

        .release-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(22px, 3vw, 38px);
            letter-spacing: 0.04em;
            color: var(--white);
            transition: letter-spacing .3s;
            text-decoration: none;
            position: relative;
            z-index: 1;
            cursor: none;
        }

        .release-type { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); text-align: right; }
        .release-year { font-size: 10px; letter-spacing: 0.1em; color: var(--light); min-width: 40px; text-align: right; }

        #gallery { border-top: 1px solid rgba(255,255,255,0.08); }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: 280px 200px;
            gap: 3px;
        }

        .g-item { overflow: hidden; position: relative; cursor: none; }
        .g-item:nth-child(1) { grid-column: 1 / 6; grid-row: 1; }
        .g-item:nth-child(2) { grid-column: 6 / 9; grid-row: 1; }
        .g-item:nth-child(3) { grid-column: 9 / 13; grid-row: 1; }
        .g-item:nth-child(4) { grid-column: 1 / 4; grid-row: 2; }
        .g-item:nth-child(5) { grid-column: 4 / 8; grid-row: 2; }
        .g-item:nth-child(6) { grid-column: 8 / 13; grid-row: 2; }

        .g-inner {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
        }

        .g-item:hover .g-inner { transform: scale(1.06); }

        .g1 { background: #0a0a0a; }
        .g2 { background: #161616; }
        .g3 { background: #0d0d0d; }
        .g4 { background: #131313; }
        .g5 { background: #0f0f0f; }
        .g6 { background: #181818; }

        .g-shape {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(40px, 6vw, 80px);
            color: rgba(255,255,255,0.06);
            user-select: none;
        }

        .g-label {
            position: absolute;
            bottom: 16px; right: 14px;
            font-size: 8px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            opacity: 0;
            transition: opacity .3s;
        }

        .g-item:hover .g-label { opacity: 1; }

        footer {
            background-color: var(--black);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 48px;
            margin-top: auto;
            width: 100%;
        }

        .footer-inner {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 32px;
        }

        .footer-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 0.12em;
            color: var(--white);
        }

        .social-links { display: flex; gap: 28px; justify-content: center; }

        .social-links a {
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--light);
            text-decoration: none;
            transition: color .2s;
        }

        .social-links a:hover { color: var(--green); }

        .footer-right { text-align: right; }

        .contact a {
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--light);
            text-decoration: none;
            transition: color .2s;
        }

        .contact a:hover { color: var(--white); }

        .copyright { margin-top: 10px; font-size: 9px; letter-spacing: 0.12em; color: var(--mid); }

        .reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s ease, transform .7s ease; }
        .reveal.on { opacity: 1; transform: none; }

        @media (max-width: 768px) {
            .hero { padding: 0 24px 64px; }
            section { padding: 72px 24px; }
            .scroll-hint { display: none; }
            .release-row { grid-template-columns: 32px 1fr auto; }
            .release-year { display: none; }
            .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 160px); }
            .g-item:nth-child(1) { grid-column: 1 / 3; grid-row: 1; }
            .g-item:nth-child(2) { grid-column: 1; grid-row: 2; }
            .g-item:nth-child(3) { grid-column: 2; grid-row: 2; }
            .g-item:nth-child(4) { grid-column: 1; grid-row: 3; }
            .g-item:nth-child(5) { grid-column: 2; grid-row: 3; }
            .g-item:nth-child(6) { display: none; }
            .footer-inner { grid-template-columns: 1fr; text-align: center; }
            .footer-right { text-align: center; }
            .social-links { flex-wrap: wrap; }
            footer { padding: 36px 24px; }
        }
    </style>
</head>
<body>

    <div class="cur" id="cur"></div>
    <div class="cur-ring" id="curRing"></div>

    <div class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Alliask</h1>
            <p class="hero-sub">Music &amp; Visual Work</p>
        </div>
        <span class="scroll-hint">Scroll</span>
    </div>

    <section id="releases">
        <div class="sec-header reveal">
            <span class="sec-num">01</span>
            <span class="sec-title">Projects</span>
            <div class="sec-line"></div>
        </div>
        <div class="releases-list reveal">
            <div class="release-row">
                <a href="https://untitled.stream/library/project/bDOlWIvXjzegJP15GCjNd" target="_blank" class="row-cover"></a>
                <span class="rel-idx">01</span>
                <span class="release-name">Lo q es</span>
                <span class="release-type">EP</span>
                <span class="release-year">2026</span>
            </div>
            <div class="release-row">
                <a href="https://untitled.stream/library/project/x10K0GoY2GQO8YJoJJ5Qj" target="_blank" class="row-cover"></a>
                <span class="rel-idx">02</span>
                <span class="release-name">Nada es imposible</span>
                <span class="release-type">Non-releasables</span>
                <span class="release-year">2026</span>
            </div>
        </div>
    </section>

    <section id="gallery">
        <div class="sec-header reveal">
            <span class="sec-num">02</span>
            <span class="sec-title">Visual Work</span>
            <div class="sec-line"></div>
        </div>
        <div class="gallery-grid reveal">
            <div class="g-item">
                <div class="g-inner g1"><span class="g-shape">A</span></div>
                <span class="g-label">Work 001</span>
            </div>
            <div class="g-item">
                <div class="g-inner g2"><span class="g-shape">&#9633;</span></div>
                <span class="g-label">Work 002</span>
            </div>
            <div class="g-item">
                <div class="g-inner g3"><span class="g-shape">&#8212;</span></div>
                <span class="g-label">Work 003</span>
            </div>
            <div class="g-item">
                <div class="g-inner g4"><span class="g-shape">&#9675;</span></div>
                <span class="g-label">Work 004</span>
            </div>
            <div class="g-item">
                <div class="g-inner g5"><span class="g-shape">K</span></div>
                <span class="g-label">Work 005</span>
            </div>
            <div class="g-item">
                <div class="g-inner g6"><span class="g-shape">&#8767;</span></div>
                <span class="g-label">Work 006</span>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-inner">
            <div class="footer-logo" id="samplesLink" style="cursor:none;">Alliask</div>
            <div class="social-links">
                <a href="https://www.instagram.com/4lliask/" target="_blank">Instagram</a>
                <a href="https://www.youtube.com/@4lliask" target="_blank">YouTube</a>
                <a href="https://x.com/4lliask?s=21" target="_blank">Twitter</a>
                <a href="https://soundcloud.com/4lliask" target="_blank">SoundCloud</a>
            </div>
            <div class="footer-right">
                <div class="contact">
                    <a href="mailto:alliask.music@gmail.com">alliask.music@gmail.com</a>
                </div>
                <div class="copyright">&copy; 2026 Alliask. All rights reserved.</div>
            </div>
        </div>
    </footer>
    <script>
        var cur = document.getElementById('cur');
        var ring = document.getElementById('curRing');
        var mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', function(e) {
            mx = e.clientX; my = e.clientY;
            cur.style.left = mx + 'px';
            cur.style.top = my + 'px';
        });

        (function tick() {
            rx += (mx - rx) * 0.1;
            ry += (my - ry) * 0.1;
            ring.style.left = rx + 'px';
            ring.style.top = ry + 'px';
            requestAnimationFrame(tick);
        })();

        document.querySelectorAll('a, .release-row, .g-item, .footer-logo, .sp-row, .sp-back').forEach(function(el) {
            el.addEventListener('mouseenter', function() { cur.classList.add('big'); ring.classList.add('big'); });
            el.addEventListener('mouseleave', function() { cur.classList.remove('big'); ring.classList.remove('big'); });
        });

        document.querySelectorAll('a.row-cover').forEach(function(el) {
            el.addEventListener('mouseenter', function() {
                cur.classList.remove('leaving');
                ring.classList.remove('leaving');
                cur.classList.add('exclaim');
                ring.classList.add('exclaim');
            });
            el.addEventListener('mouseleave', function() {
                cur.classList.remove('exclaim');
                ring.classList.remove('exclaim');
                cur.classList.add('leaving');
                ring.classList.add('leaving');
                setTimeout(function() {
                    cur.classList.remove('leaving');
                    ring.classList.remove('leaving');
                }, 400);
            });
        });

        var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('on'); });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(function(el) { obs.observe(el); });

        var samplesLink = document.getElementById('samplesLink');
        var samplesPage = document.getElementById('samplesPage');
        var spBack = document.getElementById('spBack');
        if (samplesLink) {
            samplesLink.addEventListener('click', function() {
                samplesPage.style.display = 'block';
                window.scrollTo(0, 0);
            });
        }
        if (spBack) {
            spBack.addEventListener('click', function() {
                samplesPage.style.display = 'none';
            });
        }
    </script>
</body>
</html>
